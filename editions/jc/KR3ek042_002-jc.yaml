body:
  text: 卷中景岳益氣養營湯治抑鬱勞傷思虛太過心神俱憊以致四肢頸項結成瘰癧累累如貫珠謂之筋癧或軟或硬或赤或白或痛或不痛日晡發熱及潰而不斂者並效人參茯苓陳皮貝母香附當歸川芎黃耆熟地白芍甘草桔梗白朮柴胡姜棗陳氏和營散堅丸治失營證堅硬如石不熱不紅漸腫漸大者人參當歸白朮茯神香附橘紅熟地南星貝母遠志丹皮柏子仁棗仁角沉蘆薈龍齒硃砂上為末煉蜜丸每服三錢食後用合歡樹皮煎湯送下景岳加味四物湯治血虛營弱肝膽有火即四物湯加山梔柴胡丹皮景岳豆豉餅治瘡瘍腫毒硬而不潰及潰而不斂並一切頑瘡惡瘡用江西豆豉餅為末唾津和作餅子如錢大厚三倍置患處以艾壯於餅上灸之干則再易如灸發背用嗽口水調餅覆患處以艾鋪餅上灸之未成者即消已成者亦殺其大毒如有不效必氣血虛故也景岳琥珀膏治頸項瘰癧及脅下初結小核漸如連珠不消不潰或潰而膿水不絕經久不瘥或成漏證琥珀白芷防風當歸木鱉子木通丁香桂心硃砂木香松香麻油上先將琥珀等六味為末其餘藥入油煎黑濾去渣徐入黃丹再煎軟硬得中入前藥成膏貼之景岳必效散治瘰癧氣血尚無虧損癧核不愈內服此藥外以針頭散腐之若氣血虧者先服益氣湯數劑後服此藥服後癧毒盡下再服前湯數劑南硼砂輕粉麝香巴豆白檳榔斑蝥上為極細末取雞子二個去黃用清調藥仍入殼內以濕紙數重餬口入飯甑蒸熟取出曝乾研末虛者每服五分實者一錢用炒生薑酒或滾湯於五更調服如覺小腹痛用益元散一服其毒俱從小便出胎婦勿餌瘡毒去後多服益氣養營湯瘡口自合景岳遇仙無比丸治瘰癧未成膿其人氣體如常宜服此丸形氣覺虛者宜先服益氣養營湯待血氣少充方服此丸核消後仍服前湯如潰後有瘀血者宜用白雪丹更不斂亦宜服此丸斂後再服前湯白朮檳榔防風黑醜密陀僧郁李仁斑蝥甘草為細末米糊丸梧子大每服二十丸早晚煎甘草檳榔湯下服至月許覺腹中微痛自小便中取下癧毒如魚目狀已破者自合未膿者自消薛氏柴胡清肝湯治肝膽三焦風熱瘡瘍或怒火憎寒發熱或瘡毒結於兩耳兩脅前後或胸乳小腹下及股足等證柴胡黃芩山梔川芎人參甘草連翹桔梗局方人參養營湯治脾肺俱虛營血不足人參黃耆當歸白朮炙甘草桂心陳皮熟地五味白芍遠志姜棗陳氏雄黃散治天蛇毒初起紅腫發熱疼痛值心者宜用之雄黃蟾酥冰片輕粉共為細末新汲水調塗紙蓋日用三次極效陳氏護心丹治瘡毒內攻口乾煩躁噁心嘔吐者宜用此藥綠豆粉乳香硃砂甘草上共研極細每服二錢白滾湯調服早晚二次景岳烏金膏治發背中央肉死塗之即腐未死塗之即生若初起腫痛用點數處則解毒頓消若瘀血腐黑塗之即潰用巴豆去殼炒黑研如膏點腫處或塗瘀肉上則自消化或加乳香少許亦可如塗瘡內或加香油少許調稀可用景岳內疏黃連湯治瘡瘍發熱而嘔大便秘結脈洪而實黃連芍藥當歸檳榔木香黃芩梔子薄荷桔梗甘草連翹大黃姜水煎仍量虛實治之三因葶藶大棗瀉肺湯治上氣喘急身與面目俱浮鼻塞聲重不聞香臭胸膈脹滿將成肺癰甜葶藶大棗須先服小青龍湯二服方用此景岳內補黃耆湯治癰毒內虛毒不起化及潰後諸虛迭見黃耆麥冬人參熟地茯苓甘草芍藥當歸川芎遠志官桂姜棗陳氏神授衛生湯解毒消毒清熱活血止痛白芷天花粉連翹牛蒡子荊芥甘草節防風金銀花歸尾川貝母乳香沒藥若大便秘結熱甚者加酒炒大黃丹溪參耆內托散治瘡癰膿毒不化膿潰作痛及痘瘡裡虛發癢或不潰膿為倒靨等證人參黃耆當歸川芎厚朴防風桔梗白芷紫草官桂木香甘草白芍新方橘葉湯治乳癰焮紅漫腫或初起或漸成膿者橘葉蒲公英象貝母夏枯草青皮當歸赤芍花粉香附黃芩張涵谷元壽丹乳癰初起服之即消已潰可保余瓣無恙龜殼止用龜蓋火煅存性研細末熱酒調服三錢儘量飲醉即愈大全赤豆薏苡仁湯治腸癰少腹癰赤小豆苡仁防己甘草大全大射干湯治胃癰始成射干升麻白朮赤芍藥赤伏苓山梔仁煎熟入蜜生地汁和服千金牡丹皮散治腸癰腹濡而痛時時下膿牡丹皮栝蔞仁桃仁薏苡仁按金匱要略云牡丹皮散用冬瓜子仁非栝蔞仁蓋冬瓜子仁有解毒護膜厚腸生肌之功大全三仁湯治胃癰小便赤澀腹滿不食薏苡仁桃仁牡丹皮冬瓜子仁說約四妙湯此瘍科首用捷法功效立奏增減活法醫者臨證酌用生黃耆當歸金銀花甘草節此方可移深居淺轉重作輕如已成氣血素虧不能穿潰者加白芷角針山甲一伏時自潰如初起焮痛口渴加天花粉此治癰疽發背腸癰之神方也新方化毒除濕湯治濕熱下注歸尾澤蘭苡仁牡丹皮赤芍金銀花枳殼川通草景岳蠟礬丸治金石發疽一切癰疽托裡止疼痛護臟腑神妙不問老少皆可服之黃蠟一兩黃色者佳溶開入礬末白礬一兩明亮淨者為末上二味和勻眾手急丸桐子大每服二三十丸漸加至四五十丸熟水或鹽湯送下日進二三服至三四兩之上愈見奇功矣此方不惟止痛生肌而已其護膜止瀉消毒化膿及內癰排膿托裡之功甚大仲景五苓散治瘡毒下部濕熱小便短少豬苓茯苓白朮澤瀉官桂陳氏活血散瘀湯治產後惡露不盡或經後瘀血作痛或暴急奔走或杖後瘀血流注腸胃作痛漸成內癰及腹痛大便燥者並宜服之川芎歸尾赤芍蘇木丹皮枳殼桃仁栝蔞仁檳榔大黃水煎空心服陳氏薏苡仁湯治腸癰腹中疼痛或脹滿不食小便澀滯婦人產後多有此病縱非癰服之尤效薏苡仁栝蔞仁牡丹皮白芍金匱附子苡仁敗醬散治腸癰薏苡仁敗醬附子上三味杵為末取方寸匕以水二升煎減半頓服小便當下局方四君子湯治一切陽虛氣弱脾衰肺損飲食少思體瘦面黃皮焦毛落脈來細軟人參白朮茯苓甘草姜棗陳氏滋陰除濕湯治鸛口疽初起朝寒暮熱日輕夜重如瘧等證川芎當歸白芍熟地柴胡黃芩陳皮知母澤瀉地骨皮貝母甘草姜陳氏和氣養營湯治前證已成不得內消者宜此藥托之人參陳皮白朮黃耆茯苓丹皮當歸熟地沉香甘草陳氏滋腎保元湯治前證元氣虛弱膿水淋漓久而不斂人參黃耆白朮茯苓歸身杜仲山萸丹皮熟地附子肉桂甘草姜棗陳氏琥珀蠟礬丸治癰疽發背已成未成之際恐毒氣不能外出必致內攻預服此丸護膜護心亦且散血解毒白礬一兩二錢黃蠟一兩雄黃一錢二分琥珀一錢硃砂一錢二分蜂蜜二錢上四味先研極細另將蜜蠟銅勺內溶化離火片時候蠟四邊稍凝方入上藥攪勻共成一塊以一人將藥火上微烘眾手急丸小寒豆大用硃砂為衣磁罐收貯每服二三十丸白湯食後送下病甚者早晚日進二次其功最效陳氏先天大造丸治風寒濕毒襲於經絡初起皮色不變漫腫無頭或陰虛外寒侵入初起筋骨疼痛日久遂成腫痛潰後膿水清稀久而不愈漸成漏證者並可服紫河車熟地歸身茯苓人參枸杞菟絲子肉蓯蓉黃精白朮何首烏川牛膝仙茅骨碎補巴戟肉破故紙遠志木香青鹽丁香黑棗肉上為末煉蜜丸每服三錢空心溫酒送下此方非獨治流注成漏者又補一切氣血虛羸勞傷內損及男婦久無嗣息並有奇功不換金正氣散治瘡瘍脾氣虛弱寒邪相搏痰停胸膈致發寒熱服此以正脾氣則痰氣自消寒熱不作蒼朮厚朴陳皮甘草半夏藿香六君子湯治脾胃虛弱或寒涼克伐腫痛不消或不潰斂宜服此湯以壯營氣則諸證自愈人參茯苓白朮甘草半夏陳皮仲景參苓白朮散治脾胃虛弱飲食不消或吐或瀉人參茯苓白朮陳皮山藥扁豆甘草建蓮砂仁苡仁桔梗仲景赤石脂餘糧湯止利赤石脂禹餘糧等分杵碎煎石脂餘糧澀以止脫重以固下甘以益氣黑地黃丸治脾腎不足房室虛損形瘦無力面色青黃亦治血虛久痔熟地蒼朮五味子乾薑用棗肉丸米飲或酒下陳氏內消沃雪湯治發背並五臟內癰尻臀諸腫大小腸癰肛門臟毒初起俱未出膿疼痛不可忍者青皮陳皮乳香沒藥連翹黃耆當歸甘草節白芷射干天花粉穿山甲貝母白芍金銀花皂角刺木香大黃水酒各半煎桂枝和營湯治寒凝濕滯氣血虛者桂枝當歸秦艽茯苓川斷廣皮牛膝當歸清營湯治肝膽二經風熱血燥筋攣結核乳癰乳痞並一切耳項肝火之證當歸生地山梔赤苓白芍柴胡川芎甘草貝母丹皮花粉連翹景岳萆薢湯治楊梅瘡及瘰癧咽喉惡瘡癰漏潰爛筋骨拘攣疼痛皆妙用土萆薢即土茯苓二三兩以水三盅煎二盅不拘時徐徐服之全生集陽和湯治陰寒腿癰鶴膝風流注等證肉桂鹿角膠白芥子熟地麻黃炮姜東垣潰堅湯知母黃柏黃連花粉黃芩升麻柴胡龍膽草連翹葛根甘草桔梗歸尾白芍三稜莪朮昆布虎潛丸治精血不足筋骨痿弱足不任地及骨蒸勞熱虎脛骨熟地龜板瑣陽當歸牛膝白芍黃柏知母陳皮羯羊肉酒煮爛搗丸鹽湯下千金獨活寄生湯治肝腎虛熱風濕內攻腰膝作痛冷痹無力屈伸不便獨活桑寄生秦艽防風細辛川芎人參當歸熟地白芍桂心茯苓杜仲牛膝甘草新方萆薢化毒湯治濕熱氣血實者萆薢歸尾丹皮牛膝防己木瓜苡仁秦艽
