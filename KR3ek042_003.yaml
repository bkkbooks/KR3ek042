body:
  text: 卷下化斑解毒湯治三焦風熱上攻致生火丹延及遍身癢痛者玄參人中黃知母生甘草石膏牛蒡子升麻川連連翹淡竹葉河間防風通聖散治外證陽毒腸風痔漏大黃芒硝荊芥防風山梔白芍連翹甘草桔梗川芎當歸石膏滑石薄荷黃芩白朮麻黃牛蒡子姜蔥錢氏升麻葛根湯治丹毒身體發熱面紅氣急啼叫驚搐等證升麻葛根白芍柴胡黃芩黑山梔木通甘草麻黃一劑飲治遍體黴瘡初起節骱酸楚服此一劑以透發其毒麻黃一錢防風一錢銀花三錢白蘚皮三錢當歸一隻切胡麻三錢甘草一錢羌活一錢秦艽一錢用肥羊肉一斤河水三大碗煎至一大碗取汁吹去面上浮油將前藥煎至一飯碗溫服以羊肉淡食過口仰面睡於帳前不可見風取汗為度景嶽仙遺糧湯治一切楊梅瘡不拘始終虛實皆可取效當歸生地防風金銀花木通苡仁連翹白蘚皮黃連白朮甘草皂角刺土茯苓即名仙遺糧用鮮者四兩洗淨以木石臼捶碎用水三碗煎二碗入前藥加燈心二十根煎服陳氏金蟬脫甲酒治楊梅瘡不拘新久輕重皆效大蛤蟆一隻好酒五斤將蛤蟆浸入封瓶口煮香二炷取起待次日隨量飲之以醉為度蓋覆出汗存酒次日只飲量之一半酒盡瘡愈服酒後不許見風忌房事慎口芎歸二術湯治結毒川芎當歸防風獨活人參茯苓銀花厚朴苡仁木瓜白朮皂角刺甘草山甲土茯苓精羊肉景嶽五寶丹治九種楊梅結毒並及兒女者真珠新白者佳三分五釐琥珀透明血色者甘草水煮三分五釐硃砂透明者三分五釐滴乳石木香甘草水煮乾研四錢片腦半分各研細末稱准共合一處每用藥末二分半入飛羅面二分半再研和勻每日用鮮土茯苓一斤洗淨用石臼木棰搗碎用水十二飯碗煎至六碗濾去渣再煎至四碗然後將藥五分細摻於土茯苓湯內隨手攪勻一日吃完重者四十服輕者一二十服即愈若舊有輕粉等毒服藥後當盡發出不使少留若病在上者加木香二錢病在下加牛膝一兩與土茯苓同煎服湯之法病在上飽服在下飢服忌茶酒並一切發風動氣之物其毒貼清涼膏或加摻藥收口十味淡齊方治下疳廣瘡誤服輕粉升藥致爛喉塌鼻遍體節骱酸楚或腐爛不堪他藥不效者川貝母去心生研一兩白芷焙一兩防風焙一兩海螵蛸浸淡漂淨去甲一兩當歸炒一兩川芎炒一兩金銀花曬一兩花粉曬一兩半夏薑汁製炒一兩南星薑汁製炒一兩五錢各藥要囫圇忌金銀銅鐵錫器在瓦盆內炒用木棰於石臼內打成末篩淨稱准分量分作二十一服每服五錢每日用鮮土茯苓一斤不見鐵器於石臼內搗碎放於瓦接罐中用河水十二飯碗煎六碗去渣下藥末五錢再煎至三飯碗朝午晚各服一碗服此六十三日收功然服此藥須要忌一切鹽味煎藥忌一切金銀銅鐵錫器如犯上二項即無效矣陳氏清肝導滯湯治肝經濕熱玉莖腫痛小水澀滯作痛者服之扁蓄瞿麥滑石甘草大黃引燈芯景嶽土萆薢湯治楊梅瘡及咽喉惡瘡癰漏潰爛筋骨拘攣疼痛皆妙用土萆薢即土茯苓二三兩以水三盅煎二蠱不拘時徐徐服之若患久或服攻擊之劑致傷脾胃氣血等證以此一味為主外加對證之藥無不神效景嶽蘆薈丸治疳癖消瘦發熱潮熱飲食少思口乾作渴或肝火食積口臭生瘡牙齦蝕爛等證蘆薈胡黃連木香青皮白蕪荑當歸茯苓陳皮甘草米糊丸丹溪二妙散治濕熱在經筋骨疼痛瘡瘍遍體蒼朮黃柏四妙丸治前證而兼血虛者蒼朮黃柏當歸細生地若濕熱甚者細生地當歸或易萆薢苡仁亦可景嶽解毒雄黃散治一切癰腫潰瘍毒勢甚者用此藥洗二三次雄黃一兩白礬四兩寒水石煅一兩五錢上為末用滾湯二三碗乘熱入藥末一兩洗患處以太乙膏或神異膏貼之陳氏石珍散治天泡作爛疼痛膿水淋漓石膏煅輕粉各一兩青黛黃柏末各三錢上為末先將甘草湯洗瘡後以此藥摻之其痛即止景嶽藜蘆膏治一切瘡疽胬肉突出用藜蘆一味為末以生豬脂研為膏塗患處周日易之又方苦參藜蘆各一兩用豬油八兩熬枯去渣入松香一兩化開離火加枯礬雄黃各一兩攪勻治膿窠瘡以此塗之大全普濟丹治疥癩等瘡硫黃花椒炒潮腦各一錢生明礬一錢五分枯白礬一錢五分豬板油二兩搗丸夏布包以火烘之候溫擦之陳氏蛇床子散治膿窠瘡生於手足遍身根硬作脹癢痛非常蛇床子大楓肉松香枯礬各一兩黃丹大黃各五錢輕粉三錢上為末麻油調搽濕爛者乾摻之陳氏一掃光治血熱濕熱癢瘡苦參黃柏各一斤煙膠一升木鱉肉蛇床子點紅椒明礬枯礬硫黃楓子肉樟冰水銀輕粉各三兩白砒五錢上為末用熟豬油二斤四兩化開入藥攪勻作丸龍眼大磁瓶收貯用時搽擦瘡上二次即愈大全芥靈丹治疥瘡枳殼麩炒山梔連翹荊芥當歸羌活各七錢白芷白蘚皮炒苦參糯米泔浸一日各一兩上為末煉蜜為丸桐子大每服五十丸白湯送下立可除根消風散治疥癬等疾羌活防風荊芥川芎厚朴人參茯苓陳皮甘草殭蠶蟬蛻藿香每服三錢茶調下陳氏繡球丸治一切乾溼疥瘡及膿窠爛瘡瘙癢無度者樟冰輕粉川椒枯礬水銀雄黃各二錢楓子肉一百粒另研以上共為末同大楓子肉再研和勻加柏油一兩化開和藥攪勻丸作圓眼大擦瘡上大全制柏散治濕毒瘡厚黃柏數斤入糞坑內浸一百日取出入黃土內埋三日取出曬乾研細蜜水調搽如瘡有水則乾摻之景嶽四生散治臁腿瘡浸淫不愈或眼目昏花名腎臟風並治風癬疥癩血風瘡證黃柏獨活白附子真者白蒺藜等分為末每服二錢用豬腰子一枚切開入藥濕紙包煨熟空心鹽湯下大全黃蠟膏治臁瘡龍骨煅赤石脂血竭各三錢研末用香油一兩入血餘一小團炸枯去渣再入黃蠟一兩白膠香三錢熔化離火再入前藥末攪勻候冷磁瓶貯之用時捏作薄片貼瘡上間三日翻轉再貼復元活血湯治跌打損傷有瘀血者柴胡花粉當歸山甲桃仁紅花大黃甘草酒煎景嶽沒藥降聖丹治跌打損傷接續筋骨當歸酒炒白芍川芎川烏頭泡去皮臍生地蘇木乳香另研沒藥另研骨碎補炙自然銅火煅醋淬十次各一兩上為末生薑汁和蜜丸每兩作四丸每服一丸用米酒半盞送下本事方玉真散一名定風散治打撲金刃破傷風重者牙關緊急腰背反張並治蛇犬所傷天南星湯泡七次如急用以濕紙裹煨防風等分上為末每服二錢溫酒調下若牙關緊急腰背反張者每服三錢童便調下若內有瘀血亦愈至於昏死心腹尚溫者連進二服亦可保全若破傷瘡口及瘋犬咬傷須用漱口水及童便洗淨隨用生南星為末摻之或以水調塗之出水為妙
