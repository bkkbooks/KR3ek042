body:
  text: 卷上仲景黃連瀉心湯治一切火熱癰腫瘡瘍黃連黃芩甘草三因溫膽湯治氣鬱生涎濕熱壅滯舌苔膩白瘍毒內攻心煩噦惡陳皮半夏茯苓甘草枳實竹茹濟生犀角地黃湯清營解熱能治一切肺胃之火犀角生地白芍丹皮加柴胡黃芩治肝火新方羚羊角散治風熱挾肝陽上逆耳癰項腫痰毒托腮等證羚羊角夏枯草丹皮鉤藤鉤連翹桑葉山梔玄參象貝母真人活命飲治一切癰疽未成膿者即消已成膿即潰此止痛消毒之聖藥也或陰夾陽陽夾陰之證皆可服金銀花防風白芷當歸天花粉乳香沒藥角針穿山甲陳皮象貝母甘草節新方疏肝流氣飲治肝鬱不舒乳癰乳痰諸證柴胡薄荷鬱金當歸丹皮黃芩白芍山梔夏枯草陳氏萬靈丹治癰疽疔毒對口濕痰流注附骨陰疽鶴膝等證茅朮八兩全蠍石斛明天麻當歸炙甘草川芎羌活荊芥防風麻黃北細辛川烏泡去皮草烏泡去皮何首烏各一兩明雄黃六錢蜜丸如彈子大每藥一兩分作四丸又六丸又九丸觀年之老弱壯取用外用硃砂六錢研細為衣活人荊防敗毒散亦名消風敗毒散發散時氣風毒邪熱亦治腸風下血風濕癰腫瘡瘍柴胡荊芥防風羌活獨活前胡川芎枳殼人參甘草桔梗茯苓內熱加酒炒黃芩熱甚加酒炒川連口渴加花粉景岳犀角升麻湯治時毒或風熱頭面腫痛或咽喉不利或鬢疽痄腮等證犀角升麻防風羌活白芷白附子黃芩甘草景岳五福消毒丹治咽喉牙口瘡毒腫痛並小兒一切熱毒瘡癤驚惕煩躁口舌生瘡夜臥不寧等證玄參桔梗茯苓人參牙硝青黛甘草麝香金箔上為末煉蜜丸芡實大每服一丸薄荷湯下景岳五利大黃湯治時毒焮腫赤痛煩渴便秘脈實而數大黃黃芩升麻芒硝梔子景岳五香連翹湯治腦疽癰疽時毒邪氣鬱滯不行者乳香木香沉香丁香香附黃耆射干連翹升麻木通獨活桑寄生甘草景岳通氣散治時毒腫甚咽喉不利取嚏以泄其毒牙皂川芎北細辛上為末用紙捻蘸少許入鼻內取嚏為效景岳犀角散治痘瘡癰毒時毒熱盛煩躁多渴小便赤澀或赤斑犀角甘草防風黃芩上為末每服二錢水一小盞煎五分溫服景岳芩連消毒飲治天行時疫大頭瘟發熱惡寒頸項腫痛脈洪痰痹等證柴胡桔梗羌活防風黃連連翹枳殼荊芥白芷川芎射干黃芩甘草加姜煎服景岳連翹湯治癰疽時毒焮赤腫痛連翹升麻朴硝玄參芍藥白蘞防風射干大黃甘草杏仁景岳定痛托裡散治瘡瘍血虛疼痛之聖藥也粟殼當歸白芍川芎乳香沒藥肉桂景岳托裡黃耆湯治癰疽氣虛作瀉甚效黃耆甘草天花粉加人參亦可東垣普濟消毒飲治疫癘憎寒壯熱頭面腫盛目不能開氣逆上喘咽喉不利口舌乾燥黃連黃芩人參生甘草桔梗柴胡薄荷葉連翹鼠黏子板藍根馬屁勃白殭蠶升麻玄參大黃節庵通聖消毒飲凡頭面腫盛兩目不開鼻塞口乾舌燥內外有熱或咽腫痛不利或內實大便秘結脈洪數煩渴者宜服之荊芥防風白芍連翹甘草川芎當歸薄荷黃芩山梔滑石桔梗石膏芒硝大黃麻黃牛蒡子腫不消加元參一方用犀角仲景小柴胡湯治肝膽風熱瘰癧結核或腫痛色赤或寒熱往來或怒火口苦耳聾耳癰乳癰乳疽等證柴胡人參黃芩生薑半夏甘草大棗節庵清涼救苦散治大頭瘟腫甚者以此敷之芙蓉葉霜桑葉白蘞白芨大黃黃連黃柏紫車前白芷雄黃赤小豆芒硝上各等分為末用蜜水調敷腫處頻掃之崔氏黃連解毒湯治一切火毒熱毒狂躁心煩濕熱壅滯諸證脈洪而數黃連黃芩黃柏山梔陳氏如意金黃散治癰疽發背諸般疔毒漆瘡火丹濕痰流毒風熱天泡肌膚赤腫婦人乳疽小兒丹毒天花粉黃柏大黃白芷厚朴陳皮甘草蒼朮南星為末或蜜水或蔥湯或蔥酒又或大藍根葉汁調敷要在臨證審用景岳清肝益營湯治肝膽小腸經風熱血燥筋攣結核或耳項胸乳脅肋作痛並一切肝火之證熟地當歸山梔龍膽草茯苓白芍柴胡白朮木瓜川芎炙甘草景岳托裡消毒散治癰疽已成不得內消者宜服此以托之人參川芎黃耆當歸白芍白朮茯苓金銀花白芷甘草桔梗皂角刺景岳梔子清肝湯治少陽經虛肝火風熱上攻遂成鬢疽痛連頸項太陽等處或耳內作癢生瘡或出水疼痛或胸乳間作痛或寒熱晡甚胸滿口苦舌乾柴胡川芎當歸牛蒡子白芍牡丹皮石膏山梔黃芩黃連甘草大全鼠黏子湯治鬢疽初起寒少熱多頭眩作痛口燥咽乾渴欲飲冷二便秘澀六脈沉實有力煩悶疼痛者桔梗鼠黏子赤芍地骨皮當歸天花粉元參甘草梢木通防風連翹大黃景岳神效黃耆湯治癰毒內虛毒不起化及潰後諸虛不能收口黃耆麥冬人參熟地茯苓甘草白芍當歸川芎遠志官桂姜棗陳無擇蒼耳散治鼻淵薄荷辛夷白芷蒼耳子蔥茶調服錢仲陽六味地黃湯治肝腎不足真陰虧損舌燥喉痛虛火牙痛牙漏牙宣等證生地山萸茯苓山藥澤瀉丹皮東垣補中益氣湯治瘡瘍元氣虧損惡寒發熱或因克伐肢體倦怠飲食少思或不能起發消散生肌收斂或兼飲食勞倦頭痛身熱煩躁作渴脈洪大弦虛或微細軟弱及脫肛痔漏等證人參黃耆於朮陳皮柴胡升麻甘草當歸大全加味逍遙散治肝鬱氣滯或口舌生瘡或耳內作痛乃乳癰乳痰等證柴胡白芍當歸茯苓白朮甘草黃芩半夏白芷陳皮桔梗嚴氏辛夷散治鼻生瘜肉藁本防風辛夷白芷升麻木通川芎細辛甘草辛夷清肺飲治鼻痔辛夷黃芩山梔麥冬百合石膏知母甘草升麻枇杷葉局方涼膈散治心火上盛中焦燥實煩躁口渴目赤頭眩口瘡唇裂吐血衄血大小便秘胃熱發斑及小兒驚急痘瘡黑陷外瘍實火內攻神識昏蒙舌黑噦惡等證芒硝大黃山梔連翹薄荷黃芩甘草竹葉陳氏涼膈清脾飲治癰瘍熱甚防風荊芥黃芩石膏山梔薄荷赤芍連翹生地甘草局方紫雪丹治外內煩熱不解發斑發黃瘴毒疫毒熱毒及小兒驚癇外瘍疔毒走黃神識昏迷黃金寒水石石膏滑石磁石升麻玄參甘草犀角羚羊角沉香丁香朴硝硝石辰砂木香麝香製法詳醫方集解葉案至寶丹犀角硃砂雄黃琥珀玳瑁西牛黃麝香龍腦金銀箔水安息香為極細末將安息香膏重湯煮入諸藥搜和丸如彈子大外用蠟護臨服剖開用人參湯下景岳奪命丹治疔瘡發背等證或麻木或嘔吐重者昏憒此藥服之不起者即起不痛者即痛痛甚者即止昏憒者即蘇嘔吐者即解未成即消已成即潰有奪命之功乃惡證中之至寶也蟾酥酒化輕粉麝香枯礬銅綠乳香沒藥寒水石煅硃砂蝸牛上為末用蝸牛或酒糊搗丸綠豆大每服二三丸蔥酒下外用一丸入瘡孔內以膏蓋之蟾酥丸治疔瘡發背腦疽乳癰附骨臀腿等疽一切惡證蟾酥酒化輕粉枯礬寒水石銅綠乳香沒藥麝香膽礬雄黃蝸牛硃砂共為末端午日於淨室中先將蝸牛研爛再用蟾酥研勻方入各藥搗勻丸如綠豆大每服三丸用蔥白嚼爛包藥在內將熱酒一杯送下被蓋臥出汗濟生歸脾養營湯治思慮太過勞傷心脾驚悸盜汗發熱體倦食少不眠或脾虛不能挕血致血妄行及婦人經帶瘍後氣血不復盜汗不眠等證人參白朮茯苓棗仁遠志歸身木香黃耆炙甘草龍眼肉陳氏清涼甘露飲治繭唇膏粱所釀暴怒所結遂成斯疾高突堅硬或損破流血或虛熱生痰或渴證久作並治犀角銀柴胡茵陳石斛枳殼麥冬甘草生地黃芩知母枇杷葉竹葉燈芯知柏四物湯治血虛煩熱生地歸身白芍川芎知母黃柏四物逍遙散柴胡當歸白芍茯苓白朮炙甘草川芎生地生薑薄荷仲景理中湯臟腑中寒四肢強直人參白朮泡姜甘草八珍湯治氣血俱虛惡寒發熱煩躁作渴大便不實飲食不進小腹脹痛眩暈昏憒瘍科氣血俱傷膿水清稀久不收斂等證人參生地茯苓當歸白朮川芎白芍炙甘草十全大補湯治癰瘍氣血虛弱患久不愈或潰瘍膿清寒熱自汗盜汗食少體倦發熱作渴人參生地黃耆肉桂白朮當歸白芍茯苓川芎炙甘草東垣升陽散火湯治陽經火鬱瘍毒壅滯葛根升麻柴胡羌活獨活防風人參芍藥炙甘草生甘草生薑大棗千金甘露飲治胃經火熱口臭喉瘡齒齦宣露吐血衄血齒血陽證骨槽生地熟地茵陳黃芩枳殼枇杷葉石斛甘草天冬麥冬知柏八味丸治陰虛火動壯水之主以制陽光即六味地黃湯加知母黃柏丹溪大補陰丸降陰火補腎水熟地龜板黃柏知母上為末將豬脊髓蒸熟煉蜜同搗和為丸景岳玉女煎治水虧火盛少陰不足陽明有餘口疳碎腐石膏熟地麥冬知母牛膝東垣清胃散治胃經火熱唇口腫痛齒齦潰爛焮痛上連頭面或惡寒發熱生地升麻黃連當歸牡丹皮石膏歸芍地黃湯治瘍後營虧胃弱飲食少思當歸白芍生地人參茯苓於朮炙甘草陳皮新方牛蒡解肌湯治頭面風熱或頸項痰毒風熱牙癰等證牛蒡子薄荷荊芥連翹山梔丹皮石斛玄參夏枯草河間地黃飲子治舌喑不能言足廢不能行此少陰氣厥不至急當溫之名曰痱證凡陰虛有二有陰中之水虛有陰中之火虛此治火虛之劑熟地山茱萸石斛麥冬五味子遠志茯苓石菖蒲肉蓯蓉肉桂附子巴戟肉局方四物湯治瘡瘍血虛發熱或因潰後致晡熱內熱煩躁不安者皆宜服之生地白芍當歸川芎錢乙導赤散治心火及小腸熱證便赤淋痛口糜生瘡生地木通竹葉甘草梢歸芍異功散治癰瘍脾胃虛弱飲食少血虛作痛人參茯苓白朮炙甘草陳皮當歸白芍崔氏桂附八味丸治命門火衰不能生土以致脾胃虛寒而患流注鶴膝等證不能消潰收斂或飲食少思或食而不化臍腹疼痛夜多漩溺即六味地黃湯加肉桂附子局方龍膽瀉肝湯治肝膽經實火濕熱脅痛耳聾膽溢口苦小便赤澀白濁便血魚口下疳囊癰等證龍膽草柴胡黃芩山梔生地車前子澤瀉木通當歸甘草仲景麻杏甘膏湯治風溫外感痰鳴氣逆或小兒慢痹風驚痰發痙麻黃杏仁甘草石膏此肺金藥麻黃髮肺邪杏仁下肺氣甘草緩肺急石膏清肺熱新方銀花解毒湯治風火濕熱癰疽疔毒金銀花地丁犀角赤苓連翹丹皮川連夏枯草清燥救肺湯治肺胃火盛咽乾喉痹咳痰吐血霜桑葉杏仁麥冬石膏人參阿膠胡麻仁甘草枇杷葉金匱半夏厚朴湯治婦人七情之氣鬱滯不散結成痰涎或如梅核在咽或中脘痞滿氣不舒暢或痰飲中滯嘔逆噁心並可取效半夏茯苓厚朴紫蘇生薑局方蘇子降氣湯治心腹脹滿喘促氣急消痰進食蘇子半夏當歸前胡桂枝厚朴橘紅甘草生薑仲景升麻葛根湯升散陽明牙痛牙咬托腮等瘍升麻葛根芍藥甘草仲景葛根芩連湯太陽陽明解表清裡外瘍火毒內逼協熱便泄葛根黃芩黃連甘草仲景升麻鱉甲湯升麻當歸蜀椒甘草鱉甲雄黃上六味以水四升煮取一升頓服之老少再服取汗金匱腎氣丸治脾腎陽虛不能行水小便不利腰重腳腫或肚腹腫脹四肢浮腫喘急痰盛口成蠱證其效如神即六味丸加牛膝車前肉桂附子節庵連翹敗毒散治發頤硬腫連翹山梔羌活玄參薄荷防風柴胡桔梗升麻川芎當歸黃芩芍藥牛蒡子加紅花同煎渴加花粉面腫加白芷項腫加威靈仙大便實加大黃穿山甲虛加人參
