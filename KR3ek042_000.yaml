body:
  text: 補遺白虎湯治肺胃實熱煨熟石膏知母甘草粳米加人參名人參白虎湯歸脾湯治瘡瘍憂思傷脾血虛發熱食少體倦或唇瘡流注及不能消散潰斂等證人參白朮黃耆當歸炙甘草茯神遠志棗仁木香龍眼肉生薑大棗新方清營解毒湯治血熱腫痛瘍疽之未成膿者宜服此鮮生地銀花丹皮赤芍山梔地丁甘草節連翹新方瀉火救肺湯治肺癰肺痿初起火盛咳逆桑白皮杏仁黃芩生石膏知母枇杷葉蘆根拔萃甘桔湯治熱腫喉痹甘草桔梗薄荷連翹黃芩山梔竹葉景岳清肝解鬱湯治肝經血虛風熱或乳內結核或膿潰不愈凡肝膽經血氣不和之病皆宜服此人參川芎當歸貝母白芍青皮柴胡茯苓熟地山梔白朮甘草丹皮景岳大黃湯一名牡丹皮散專治腸癰小腹堅腫而熱按之則痛肉色如故或焮赤微腫小便頻數汗出憎寒其脈沉緊膿未成者急服之牡丹皮栝蔞仁各三錢桃仁去皮尖大黃煨芒硝各二錢本方無栝蔞即名大黃牡丹皮湯旋覆蔥絳湯治血液虧損肝氣脹痛或少腹癥瘕旋覆青蔥新絳河間金鈴子散治肝氣鬱逆諸證金鈴子延胡仲景鱉甲煎丸治瘧母一切癥結鱉甲烏扇黃芩柴胡鼠婦乾薑大黃芍藥桂枝葶藶石葦厚朴丹皮瞿麥紫葳半夏人參䗪蟲阿膠蜂窠赤硝蜣螂桃仁煅灶下灰清酒千金方有海藻大戟無鼠婦赤硝新方疏肝導滯湯治肝經鬱滯欲成乳癖乳癰乳岩等證川楝子延胡青皮白芍當歸香附丹皮山梔羌活勝濕湯治外傷濕氣一身盡痛羌活獨活藁本蔓荊子川芎炙甘草防風如身重腰痛沉沉然經有寒也加漢防己五分附子五分新方萆薢滲濕湯治濕熱下注臁瘡漏蹄等證萆薢苡仁黃柏赤苓丹皮澤瀉滑石通草大全苦參湯一切疥癩瘋癬洗之並佳苦參二兩蛇床子白芷金銀花野菊花黃柏地膚子大菖蒲用河水煎湯臨洗入豬膽汁四五枚洗二三次全愈宜避風忌發物寶鑑通天再造散治大瘋實熱內壅以此攻之皂角刺大黃炒各一兩鬱金五錢白醜頭末六錢五分半生半熟上為末每服五錢日未出時向東以無灰酒調服當日必利下惡物或臭膿或蟲如蟲口黑色乃是年深者赤色是近日者數日再進一服無蟲積乃止忌口避風並房事寶鑑醉仙散治癘風遍身麻木鼠黏子胡麻子蔓荊子炒黑枸杞各一兩苦參白蒺藜栝蔞根防風各五錢上為末每一兩入輕粉一錢拌勻每服一錢茶清調晨午晚各一服服後五七日先於牙縫內出臭涎渾身痛昏悶如醉後利下惡物臭積為效陳氏苦參丸治大麻瘋不分新久穿潰爛老幼俱可服之苦參一斤楓子肉六兩荊芥一斤防風六兩白芷六兩全蠍何首烏白附子枸杞子威靈仙當歸大胡麻川芎蒺藜大皂角川牛膝牛蒡子獨活各五兩蔓荊子風藤羌活連翹蒼朮天麻杜仲草烏泡去皮尖甘草各三兩杏仁二兩人參一兩白花蛇切片炙黃二兩上為細末醋打老米糊為丸梧子大每服三四十丸溫酒食前後下避風忌口陳氏硇砂散治鼻痔硇砂一錢輕粉三分冰片五釐雄黃三分共為末用草梗咬毛蘸藥勤點鼻痔上日五六次自然漸化為水而愈陳氏翠云錠治眼泡菌毒杭粉五兩銅綠一兩輕粉一錢用黃連一兩同川米百粒熬膏和藥作錠陰乾又治爛弦風眼或暴赤腫痛者大全清涼丸治眼泡菌毒當歸尾石菖蒲赤芍各二錢羌活五分地膚子生杏仁川連各一錢膽礬二分共研粗以大紅綢包紮如櫻桃大滾水浸泡乘熱蘸洗清溪北庭丹點舌菌人中白番硇各五分溏雞糞瓦上青苔瓦松各一錢上用傾銀罐子二個將藥裝在罐內將口封固外用鹽泥固濟以炭火煅紅俟三炷香為度候冷開罐將藥取出入冰片麝香各一分共研細末用磁針破舌菌用丹少許點上再以蒲黃蓋之蛤粉散濕熱痛瘡以此摻之蛤粉輕粉白芨冰片大全鵝黃散治坐板瘡綠豆粉一兩黃柏三錢輕粉三錢滑石五錢陳氏太乙膏一切癰疽瘡瘍提膿生新神效生地土木鱉元參赤芍大黃白芷當歸各五錢肉桂二錢五分乳香沒藥各二錢阿魏一錢輕粉一錢五分血餘一團用麻油一斤入藥熬枯濾去渣下血餘再熬枯去渣將炒過淨東丹六兩攪勻看老嫩適中方下阿魏乳沒輕粉攪勻攤貼黃連膏治足三陰濕熱腿腳紅腫皮破脂流類乎血瘋浸淫不止痛癢非常者先用桐油一斤入鍋熬起白星為度加黃蠟一兩五錢溶化入研細炒黑大黃末一斤攪勻再入冰片二分攤貼景岳金黃散敷天泡濕熱等瘡滑石一兩粉甘草五錢此方或加綠豆粉枯礬治濕熱肥瘡更妙景岳托裡散治一切瘡毒始終常服不致內陷栝蔞杵當歸酒拌黃耆鹽水炒白芍甘草熟地花粉銀花角刺上用無灰酒煎服麥味地黃丸治腎陰不足火爍肺金喘咳勞熱或有鼻衄鼻淵等證麥冬生地茯苓五味子鬱金白芍烏藥丹皮澤瀉萸肉山藥歸身上為末煉蜜丸每服五錢大全紅棉散治耳內生瘡流膿乃肝經鬱火所結枯白礬二錢胭脂棉一錢煅存性研勻先用棉杖子攪去膿水後蘸藥摻入耳底膿自干又有加麝香少許者元戎逍遙散治肝鬱不舒致成乳癖乳岩失營瘰癧等證當歸白芍白朮茯神柴胡甘草薄荷上姜水煎服千金葦莖湯治肺癰葦莖苡仁桃仁瓜瓣陳氏牛蒡子散治乳癰乳疽結腫疼痛無論新久但未成膿者服之牛蒡子陳皮山梔銀花甘草黃芩花粉連翹栝蔞仁角刺柴胡青皮水煎加酒一杯服景岳石膏散治陽明風熱頭痛或孕婦乳房結核石膏川芎白芷等分上為末每服四錢茶調下陳氏托裡消毒湯治癰疽已成不得內消者宜服此以托之人參川芎白芍黃耆當歸白朮茯苓白芷金銀花皂角刺甘草桔梗延壽丹治小兒臍風貝母白芷苡仁車前子川連赤芍木通山梔金匱牡丹皮湯治腸癰脈遲而緊未成膿當服此以下其血大黃芒硝丹皮桃仁瓜子仁岐天師七味神聖湯治騎馬癰金銀花蒲公英人參當歸甘草大黃花粉黃耆柴胡湯治陰包毒黃耆柴胡丹皮牛膝丹參黃芩荊芥防風山梔雞子大黃丸治毒濁下疳錦紋大黃一兩切片曬乾研用雞子雄七枚搗丸分三服每日空心燒酒下陳氏涼血消風散治風濕浸淫血脈致生瘡疥搔癢無度及大人小兒風熱癮疹遍身雪片斑點乍有乍無並效當歸生地防風蟬蛻知母苦參胡麻荊芥蒼朮石膏甘草木通牛蒡子水煎服陳氏神應養真丹治厥陰經為四氣所襲腳膝無力左癱右瘓半身不遂手足頑麻言語蹇澀氣血凝滯遍身疼痛者並服當歸川芎白芍天麻羌活熟地木瓜菟絲子上為末入地黃膏加蜜丸每服四錢空心鹽湯下四苓散治同五苓即五苓去桂萬應膏即萬靈膏口疳藥詳冰青散內殺疳藥詳冰青散內化膿生肌膏即應用膏夾紙膏即十層膏國老散即用甘草一斤為末每服三錢酒下隔蒜灸法用大蒜頭去皮切三分厚安瘡頭上用艾壯於蒜上灸之五壯換蒜或三五十壯或至百壯未成者即消已成者亦殺其大勢不能為害如瘡大用蒜搗爛攤患處將艾鋪上燒之蒜敗再換其痛者灸至不痛不痛者灸至痛灸後仍服托裡之劑神燈照法雄黃硃砂血竭沒藥各一錢麝香二分上研末用棉紙卷為粗捻約長尺許每捻中入藥三分以真麻油潤透點灼瘡上須離瘡半寸許自紅暈外周圍徐徐照之以漸將捻收入瘡口更須將捻猛向外提以引毒氣出外自不內侵臟腑初用三條漸加至五七條瘡勢漸消可漸減之隨後用敷藥桑枝灸法治諸瘡毒堅而不潰潰而不腐新肉不生疼痛不止用桑枝燃著向患處灸之火盡再換灸至片時為度家用膏丹丸散方紅升丹一名三仙丹一切瘡瘍潰後拔毒去腐生新長肉瘡口堅硬肉黯紫黑用丹少許雞翎掃上立刻紅活外科若無升降二丹焉能立刻奏效水銀二兩槍硝二兩白明礬二兩先將硝礬研碎放於鐵鍋內中開低窩以水銀傾入窩內將硝礬蓋之用磁碗蓋合以棉紙捻條捺碗口再以鹽泥封固後將黃沙壓住碗旁露出碗底以新棉花著碗底內用鐵磚壓上先用文火一炷香烘烊硝礬次用武火一炷香看碗底內棉花焦黑為度如不焦再煉半炷香取下冷開刮下之丹磁瓶貯之退火用一方有皂礬雄黃硃砂約各一兩名大升丹力量尤大白降丹凡癰疽無名大毒每用少許瘡大者用六七釐小者用一二釐水調敷瘡頭上初起者立刻起泡消散成膿者腐肉即脫拔毒消腫誠乃奪命金丹也水銀一兩火硝一兩白礬一兩白砒五錢食鹽一兩石青三錢硼砂三錢皂礬一兩用陽城罐一隻放微火上徐徐挑藥入罐化盡微火逼令極干所謂陰升之法全在此刻如火大則汞先飛走如不幹則藥必倒塌無用其難如此結胎後以瓦盆一隻盛水半盆將粗宮碗一隻覆合於水內碗底上以三寸盆仰放後再以陽城罐倒合於盆內用好棉紙截寸許闊以罐子泥草鞋灰光粉三樣研細以鹽滷汁和練極熟於罐口合緊一層泥一層紙糊五六層候乾再將醬缸蓋量陽城罐之大小中鑿一洞套於罐之半腰恰蓋著於盆口上外用新瓦三片鐵絲紮緊如煙通罐樣入炭用武火二炷香其丹即降於盆內退火冷開即名白雪丹降藥之神不假刀砭一伏時便見功效勝於刀針之險多矣上降藥法癰疽初起堅硬未成膿者用水調一二釐塗於瘡頂上不可貼膏藥少頃即起一泡挑破出水自消已成而內膿急脹按之隨手而起者此膿已熟矣用水調一二釐點正頂上以膏貼之一伏時大膿自泄不假刀針如陰疽根腳走散瘡頭平陷即用降丹七八釐或分許水調掃於瘡頭堅硬處次日即轉紅活便是吉兆如瘡毒內膿已成久不穿潰者只要出一小頭怕頭出過大可用棉紙一塊量瘡大小中剪一孔以水潤貼瘡上然後調降藥點放紙孔內揭去紙以膏貼之則所降之頭不致過大若瘡小藥大反令痛傷胃口焮及良肉不可不知白降丹點在瘡毒上即追蝕毒氣有幾分深必追至病根方止所以點後疼痛非常若內膿已脹皮殼不厚點之便不十分痛楚有用蟾酥化汁調白降丹用其疼稍減水煉降藥法新煉出白降丹研細用元色緞五寸將降藥篩勻緞上卷緊以麻線捆紮極緊放瓦罐內清水煮約一伏時內換水三次將緞卷取起掛風處陰乾然後打開以雞翎掃下磁瓶收貯凡治癰疽用之並無痛楚應用膏治疔疽流注腿癰穿潰者用此當歸連翹白芨白蘞大黃山梔各八錢官桂二錢蒼朮羌活天麻防風黃耆荊芥川甲甘草芫花各六錢方八蓖麻子小生地各一兩用真麻油十斤入藥文武火熬枯濾去渣再熬至滴水成珠稱每斤淨油春秋下潤淨東丹五兩冬四兩夏六兩收成膏後下乳香沒藥末各一兩攪勻攤用萬靈膏治一切無名腫毒未成即消已成即潰並治一切寒濕之證生地歸身川芎蒼耳子大戟尖檳甘菊蒲公英生大黃土槿皮羌活獨活紅花川烏草烏赤芍紫草香附川椒番木鱉桂枝狗脊澤蘭生薑胡椒附子牙皂白附子荊芥金銀花黃柏山慈菇生首烏全蟲玄胡殭蠶百部南星白蒺藜山甲白芷白芥子花粉益母草蛇床子川牛膝黃耆大楓子肉細辛苦參龜板桑寄生升麻黃芩胡麻杜菖蒲根冬瓜皮天麻楊樹須鬧羊花茜草以上各五錢土茯苓一兩用香油八斤將前藥入油加嫩桑枝二三斤熬藥至枯濾去渣入後藥松香四兩朴硝雄黃桂圓核灰皂礬牛皮灰樟冰各五錢麝香三錢冰片三錢龍骨五錢再入東丹三斤收成膏內傷膏治內傷腰疼足酸寒濕流筋流絡流注鶴膝瘋痹等證毛鹿角切二兩烏藥八兩紅花二兩全當歸切一兩二錢木瓜一兩上官桂二兩生薑去毛打二兩秦艽二兩老鸛草二兩離鄉草三兩虎骨酥炙二兩商陸三兩用麻油十斤浸藥二十一日煎枯濾去渣離火入淘淨飛丹六斤收成膏再入肉桂去皮研末二兩乳香沒藥末各二兩麝香二錢攪勻用紅布或青皮攤貼紫金膏治痰核瘰癧官桂六兩生地十二兩秦艽